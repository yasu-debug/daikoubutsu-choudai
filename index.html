<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>大好物ちょうだい！</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; margin: 0; }
        #neiro { width: 150px; position: absolute; bottom: 20px; left: calc(50% - 75px); transition: transform 0.1s; }
        .food { width: 80px; position: absolute; top: -100px; cursor: pointer; }
        #score { font-size: 24px; margin-top: 10px; position: relative; z-index: 10; }
    </style>
</head>
<body>
    <h1>Neiroに食べ物をあげよう！</h1>
    <div id="score">スコア: <span id="count">0</span></div>
    <img id="neiro" src="Neiro1.png" alt="Neiro">

    <script>
        let count = 0;
        const neiro = document.getElementById('neiro');
        const countDisplay = document.getElementById('count');
        // リポジトリにアップしたファイル名と完全に一致させてください
        const foods = ['Natto.png', 'yakiimo.png', 'chocolate.png', 'Pinnaple.png'];

    function dropFood() {
            const food = document.createElement('img');
            food.src = foods[Math.floor(Math.random() * foods.length)];
            food.className = 'food';
            
            // 【変更点】Neiroちゃんの位置を基準にランダムな場所を決める
            const neiroLeft = neiro.offsetLeft;
            const randomOffset = (Math.random() - 0.5) * 100; // Neiroの周り±50px
            food.style.left = (neiroLeft + randomOffset) + 'px';
            
            document.body.appendChild(food);

            let top = -100;
            const timer = setInterval(() => {
                top += 5;
                food.style.top = top + 'px';

                // Neiroとの当たり判定
                const neiroRect = neiro.getBoundingClientRect();
                const foodRect = food.getBoundingClientRect();

                if (foodRect.bottom > neiroRect.top && 
                    foodRect.left < neiroRect.right && 
                    foodRect.right > neiroRect.left) {
                    
                    count++;
                    countDisplay.innerText = count;
                    neiro.src = 'Neiro2.png';
                    setTimeout(() => neiro.src = 'Neiro1.png', 200);
                    food.remove();
                    clearInterval(timer);
                }

                // 画面外に出たら消す
                if (top > window.innerHeight) {
                    food.remove();
                    clearInterval(timer);
                }
            }, 20);
        }

        setInterval(dropFood, 1500);
    </script>
</body>
</html>
